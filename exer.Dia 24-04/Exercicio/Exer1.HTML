<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Imagens com Botões</title>
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 50px;
    }

    .box {
      text-align: center;
    }

    img {
      width: 200px;
      height: 200px;
      object-fit: cover;
      display: block;
      margin-bottom: 10px;
    }

    button {
      padding: 8px 15px;
      cursor: pointer;
      border: none;
      background-color: #007BFF;
      color: white;
      border-radius: 5px;
    }

    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="box">
      <img id="img1" src="https://img2.lovecell.com.br/919fda2db3ef2469f931728e24a08bd3164358cd4600fc81c04b9862db125fee.webp">
      <button onclick="toggleImage('img1', this, 'Imagem 1')">shhhh</button>
    </div>

    <div class="box">
      <img id="img2" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT06UyrM5yCqnn84fKaP57Ok27RpPz1BlCLbg&s">
      <button onclick="toggleImage('img2', this, 'Imagem 2')">Som de sumiço</button>
    </div>

    <div class="box">
      <img id="img3" src="https://i.ytimg.com/vi/ZB4FxVqP1DE/hq720.jpg?sqp=-oaymwE7CK4FEIIDSFryq4qpAy0IARUAAAAAGAElAADIQj0AgKJD8AEB-AHUBoAC4AOKAgwIABABGF8gZSg8MA8=&rs=AOn4CLAsAdjWyWrBjZtrkImHxAy5MdBmQw">
      <button onclick="toggleImage('img3', this, 'Imagem 3')">Sumiu</button>
    </div>

  </div>

  

</body>
</html>
